<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Conversor de Moedas Global</title>
  <link href="style.css" rel="stylesheet"/>
</head>
<body>
  <div class="container">
    
    <div class="header-topo">
        <h1 class="page-title">💱 Conversor</h1>
        <button id="btnTema" onclick="alternarTema()">🌙 Escuro</button>
    </div>
    
    <p class="page-subtitle">Dólar, Euro, Libra, Iene, Yuan e Real</p>
    
    <div id="painelCotacoes" class="cotacoes-box">
       <p>Carregando mercado financeiro...</p>
    </div>

    <div id="etapa1">
        <div class="input-group">
            <label for="moedaOrigem">Eu tenho (Moeda de Origem):</label>
            <select id="moedaOrigem">
                <option value="BRL">🇧🇷 Real Brasileiro (R$)</option>
                <option value="USD">🇺🇸 Dólar Americano (US$)</option>
                <option value="EUR">🇪🇺 Euro (€)</option>
                <option value="GBP">🇬🇧 Libra Esterlina (£)</option>
                <option value="JPY">🇯🇵 Iene Japonês (¥)</option>
                <option value="CNY">🇨🇳 Yuan Chinês (¥)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="valorInput">Digite o valor:</label>
            <input type="text" id="valorInput" inputmode="numeric" placeholder="0,00" oninput="mascaraDinheiro(this)" />
        </div>
        <button type="button" class="btn-principal" onclick="avancarParaEtapa2()">Escolher Destinos</button>
    </div>

    <div id="etapa2" style="display: none;">
        
        <div id="resumoOperacao" class="resumo-box"></div>

        <label class="pergunta-moeda">Quero converter para:</label>
        
        <div class="checkbox-group">
            <label id="labelCheckBRL"><input type="checkbox" id="checkBRL"> 🇧🇷 Real Brasileiro</label>
            <label id="labelCheckUSD"><input type="checkbox" id="checkUSD" checked> 🇺🇸 Dólar Americano</label>
            <label id="labelCheckEUR"><input type="checkbox" id="checkEUR" checked> 🇪🇺 Euro</label>
            <label id="labelCheckGBP"><input type="checkbox" id="checkGBP"> 🇬🇧 Libra Esterlina</label>
            <label id="labelCheckJPY"><input type="checkbox" id="checkJPY"> 🇯🇵 Iene Japonês</label>
            <label id="labelCheckCNY"><input type="checkbox" id="checkCNY"> 🇨🇳 Yuan Chinês</label>
        </div>

        <button type="button" class="btn-principal" onclick="calcularEExibir()">Ver Resultados</button>
        <button type="button" onclick="voltarEtapa1()" class="btn-voltar">← Voltar e alterar valor</button>
    </div>
    
    <div id="areaResultados"></div>
    
  </div>

  <script src="script.js"></script> 
</body>
</html>
